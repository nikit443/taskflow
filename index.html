// ── Utils ─────────────────────────────────────────────────────────────────────
const todayStr  = () => new Date().toISOString().split("T")[0];
const addDays   = n  => { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };
const daysUntil = s  => { const n=new Date(); n.setHours(0,0,0,0); const d=new Date(s); d.setHours(0,0,0,0); return Math.ceil((d-n)/86400000); };
const genId     = () => { try{return crypto.randomUUID();}catch{return Math.random().toString(36).slice(2)+Date.now().toString(36);} };
const hashPw    = pw => { let h=5381; for(let i=0;i<pw.length;i++) h=((h<<5)+h)^pw.charCodeAt(i); return "h_"+(h>>>0).toString(16); };

function getReminderLabel(dueDate, isDaily) {
  if (isDaily) return { label:"Daily",     color:"#534AB7", bg:"#EEEDFE" };
  const d = daysUntil(dueDate);
  if (d <  0) return { label:"Overdue",    color:"#A32D2D", bg:"#FCEBEB" };
  if (d === 0) return { label:"Due today", color:"#854F0B", bg:"#FAEEDA" };
  if (d <= 3)  return { label:`${d}d left`,color:"#A32D2D", bg:"#FCEBEB" };
  if (d <= 7)  return { label:`${d}d left`,color:"#854F0B", bg:"#FAEEDA" };
  if (d <= 15) return { label:`${d}d left`,color:"#3B6D11", bg:"#EAF3DE" };
  return        { label:`${d}d left`,      color:"#185FA5", bg:"#E6F1FB" };
}
const shouldShowToday = t => t.isDaily || daysUntil(t.dueDate) <= 1;
const shouldRemind    = t => { const d=daysUntil(t.dueDate); return t.isDaily||[0,1,3,7,15,30].includes(d)||d<0; };
const getStatus = (task, empId) => {
  const s = task.statuses && task.statuses[empId];
  if (!s) return null;
  if (task.isDaily && s.dailyDate !== todayStr()) return null;
  return s;
};

// ── Firebase DB wrapper ───────────────────────────────────────────────────────
let _db = null;
function getDB() {
  if (!_db) {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _db = firebase.database();
  }
  return _db;
}
const dbSet    = (path, val) => getDB().ref(path).set(val);
const dbUpdate = (path, val) => getDB().ref(path).update(val);
const dbRemove = (path)      => getDB().ref(path).remove();
const dbGet    = (path)      => getDB().ref(path).get().then(s => s.exists() ? s.val() : null);
const dbListen = (path, cb)  => { const r=getDB().ref(path); r.on('value', s=>cb(s.exists()?s.val():null)); return ()=>r.off(); };
const dbMultiUpdate = (updates) => getDB().ref().update(updates);

function App() {
  const [appState, setAppState] = useState("loading"); // loading | config_error | conn_error | ready
  const [users,   setUsers]   = useState({});
  const [tasks,   setTasks]   = useState({});
  const [notifs,  setNotifs]  = useState({});
  const [user,    setUser]    = useState(null);
  const [loginForm, setLoginForm] = useState({username:"",password:""});
  const [loginErr,  setLoginErr]  = useState("");
  const [showPw,  setShowPw]  = useState(false);
  const [saving,  setSaving]  = useState(false);
  const [tab,     setTab]     = useState("today");
  const [filterEmp,   setFilterEmp]   = useState("all");
  const [notifOpen,   setNotifOpen]   = useState(false);
  const [addTaskOpen, setAddTaskOpen] = useState(false);
  const [addEmpOpen,  setAddEmpOpen]  = useState(false);
  const [rejectModal,       setRejectModal]       = useState(null);
  const [deleteConfirm,     setDeleteConfirm]     = useState(null);
  const [deactivateConfirm, setDeactivateConfirm] = useState(null);
  const [newTask, setNewTask] = useState({title:"",desc:"",assignedTo:{},dueDate:addDays(1),isDaily:false});
  const [newEmp,  setNewEmp]  = useState({name:"",username:"",password:""});
  const [rejectComment, setRejectComment] = useState("");
  const [formErr, setFormErr] = useState("");

  // ── Bootstrap ──────────────────────────────────────────────────────────────
  useEffect(()=>{
    if (FIREBASE_CONFIG.apiKey === "YOUR_API_KEY") { setAppState("config_error"); return; }
    
    // Test Firebase connection
    const msg = document.getElementById("load-msg");
    if(msg) msg.textContent = "Connecting to Firebase…";
    
    try { 
      const testDB = getDB();
      if(msg) msg.textContent = "Firebase connected, loading data…";
    } catch(e) { 
      console.error("Firebase init error:", e);
      setAppState("conn_error"); 
      return; 
    }

    // Set a timeout - if data doesn't load in 10s, show connection error
    const timeout = setTimeout(()=>{
      console.error("Firebase timeout - no data received after 10s");
      setAppState("conn_error");
    }, 10000);

    seedIfEmpty()
      .then(()=>{
        if(msg) msg.textContent = "Loading app…";
        const u1 = dbListen("users",        v => { console.log("users:", v); setUsers(v||{}); });
        const u2 = dbListen("tasks",        v => { console.log("tasks:", v); setTasks(v||{}); clearTimeout(timeout); setAppState("ready"); });
        const u3 = dbListen("notifications",v => setNotifs(v||{}));
        return ()=>{ u1(); u2(); u3(); clearTimeout(timeout); };
      })
      .catch(e=>{ 
        console.error("seedIfEmpty error:", e); 
        clearTimeout(timeout);
        setAppState("conn_error"); 
      });
  },[]);

  // ── Notify ─────────────────────────────────────────────────────────────────
  const notify = async (userId, message) => {
    const id=genId();
    await dbSet(`notifications/${id}`,{id,userId,message,read:false,createdAt:new Date().toISOString()});
  };

  // ── Auth ───────────────────────────────────────────────────────────────────
  function login() {
    const u = Object.values(users).find(u=>u.username===loginForm.username&&u.passwordHash===hashPw(loginForm.password));
    if (!u) { setLoginErr("Invalid username or password."); return; }
    if (!u.active) { setLoginErr("Account deactivated. Contact your manager."); return; }
    setUser(u); setLoginErr("");
    // Mark notifications read
    const updates={};
    Object.entries(notifs).filter(([,n])=>n.userId===u.id&&!n.read).forEach(([id])=>updates[`notifications/${id}/read`]=true);
    if(Object.keys(updates).length) dbMultiUpdate(updates).catch(()=>{});
  }
  function logout(){ setUser(null); setLoginForm({username:"",password:""}); setTab("today"); }

  // ── Task actions ───────────────────────────────────────────────────────────
  async function markDone(taskId, empId) {
    setSaving(true);
    await dbUpdate(`tasks/${taskId}/statuses/${empId}`,{state:"pending",comment:"",dailyDate:todayStr()});
    const t=tasks[taskId],e=users[empId];
    if(t&&e) await notify("admin",`${e.name} submitted "${t.title}" for approval.`);
    setSaving(false);
  }
  async function approveTask(taskId, empId) {
    setSaving(true);
    await dbUpdate(`tasks/${taskId}/statuses/${empId}`,{state:"done",comment:"",dailyDate:todayStr()});
    const t=tasks[taskId];
    if(t) await notify(empId,`✓ Your task "${t.title}" was approved.`);
    setSaving(false);
  }
  async function doRejectTask() {
    if(!rejectComment.trim()) return;
    const {taskId,empId}=rejectModal;
    setSaving(true);
    await dbUpdate(`tasks/${taskId}/statuses/${empId}`,{state:"rejected",comment:rejectComment,dailyDate:todayStr()});
    const t=tasks[taskId];
    if(t) await notify(empId,`✗ "${t.title}" rejected: "${rejectComment}"`);
    setRejectModal(null); setRejectComment(""); setSaving(false);
  }
  async function doDeleteTask(id) {
    setSaving(true);
    await dbRemove(`tasks/${id}`);
    setDeleteConfirm(null); setSaving(false);
  }
  async function doAddTask() {
    if(!newTask.title.trim()){setFormErr("Task title is required.");return;}
    if(!Object.keys(newTask.assignedTo).length){setFormErr("Assign to at least one employee.");return;}
    setSaving(true);
    const id=genId();
    await dbSet(`tasks/${id}`,{...newTask,id,statuses:{},createdAt:new Date().toISOString(),createdBy:user.id});
    for(const eid of Object.keys(newTask.assignedTo)) await notify(eid,`New task assigned: "${newTask.title}"`);
    setNewTask({title:"",desc:"",assignedTo:{},dueDate:addDays(1),isDaily:false});
    setAddTaskOpen(false); setFormErr(""); setSaving(false);
  }
  async function doAddEmployee() {
    if(!newEmp.name.trim()||!newEmp.username.trim()||!newEmp.password.trim()){setFormErr("All fields required.");return;}
    if(Object.values(users).find(u=>u.username===newEmp.username)){setFormErr("Username already taken.");return;}
    if(newEmp.password.length<4){setFormErr("Password must be at least 4 characters.");return;}
    setSaving(true);
    const id=genId();
    await dbSet(`users/${id}`,{id,username:newEmp.username,passwordHash:hashPw(newEmp.password),name:newEmp.name,role:"employee",active:true,createdAt:new Date().toISOString()});
    setNewEmp({name:"",username:"",password:""}); setAddEmpOpen(false); setFormErr(""); setSaving(false);
  }
  async function doToggleDeactivate(empId) {
    await dbUpdate(`users/${empId}`,{active:!users[empId].active});
    setDeactivateConfirm(null);
  }
  async function clearNotifs() {
    const updates={};
    Object.entries(notifs).filter(([,n])=>n.userId===user.id).forEach(([id])=>updates[`notifications/${id}`]=null);
    await dbMultiUpdate(updates);
  }

  // ── Derived ────────────────────────────────────────────────────────────────
  const taskList    = Object.values(tasks);
  const employees   = Object.values(users).filter(u=>u.role==="employee");
  const activeEmps  = employees.filter(e=>e.active);
  const myNotifs    = user ? Object.values(notifs).filter(n=>n.userId===user.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)) : [];
  const unread      = myNotifs.filter(n=>!n.read).length;
  const empName     = id => users[id]?.name||"Unknown";
  const getEmpTasks = id => taskList.filter(t=>t.assignedTo&&t.assignedTo[id]);
  const filteredEmps= filterEmp==="all" ? activeEmps : activeEmps.filter(e=>e.id===filterEmp);
  const overdueCount= taskList.filter(t=>!t.isDaily&&daysUntil(t.dueDate)<0).length;
  const pendingApprovals = taskList.flatMap(t => {
    if(!t.statuses) return [];
    return Object.entries(t.statuses)
      .filter(([eid,s])=>!(t.isDaily&&s.dailyDate!==todayStr())&&s.state==="pending")
      .map(([eid])=>({task:t,empId:eid}));
  });

  // ── State screens ──────────────────────────────────────────────────────────
  if (appState==="loading") return null; // spinner in HTML handles this

  if (appState==="config_error") return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{...S.card,maxWidth:420,padding:28,textAlign:"center"}}>
        <div style={{fontSize:44,marginBottom:12}}>🔧</div>
        <h2 style={{fontSize:18,fontWeight:700,margin:"0 0 10px"}}>Firebase not configured yet</h2>
        <p style={{fontSize:14,color:C.muted,lineHeight:1.7,margin:"0 0 16px"}}>Open <code style={{background:"#f0f0f0",padding:"2px 6px",borderRadius:4}}>index.html</code> and replace the <strong>FIREBASE_CONFIG</strong> block at the top with your values from the Firebase Console.</p>
        <div style={{background:"#f5f5f5",borderRadius:8,padding:14,textAlign:"left",fontSize:12,fontFamily:"monospace",lineHeight:2,color:"#333"}}>
          apiKey: "YOUR_API_KEY",<br/>
          authDomain: "…",<br/>
          databaseURL: "…",<br/>
          projectId: "…",<br/>
          storageBucket: "…",<br/>
          messagingSenderId: "…",<br/>
          appId: "…"
        </div>
        <p style={{fontSize:12,color:C.faint,marginTop:14}}>See the setup instructions below.</p>
      </div>
    </div>
  );

  if (appState==="conn_error") return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{...S.card,maxWidth:360,padding:28,textAlign:"center"}}>
        <div style={{fontSize:44,marginBottom:12}}>📡</div>
        <h2 style={{fontSize:18,fontWeight:700,margin:"0 0 10px"}}>Connection failed</h2>
        <p style={{fontSize:14,color:C.muted,lineHeight:1.6}}>Could not connect to Firebase. Check your internet and config, then retry.</p>
        <button style={{...S.btnP,marginTop:16,width:"100%"}} onClick={()=>window.location.reload()}>Retry</button>
      </div>
    </div>
  );

  // ── Login screen ───────────────────────────────────────────────────────────
  if (!user) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px 16px"}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:60,height:60,borderRadius:16,background:C.purple,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:28,color:"#fff",fontWeight:700}}>✓</div>
          <h1 style={{fontSize:24,fontWeight:800,margin:0,color:C.text}}>TaskFlow</h1>
          <p style={{fontSize:14,color:C.muted,marginTop:6}}>Team task manager</p>
        </div>
        <div style={{...S.card,padding:24}}>
          <label style={S.label}>Username</label>
          <input style={S.input} value={loginForm.username} autoFocus
            onChange={e=>setLoginForm(f=>({...f,username:e.target.value}))}
            placeholder="Enter username" onKeyDown={e=>e.key==="Enter"&&login()}/>
          <label style={S.label}>Password</label>
          <div style={{position:"relative",marginBottom:10}}>
            <input style={{...S.input,marginBottom:0,paddingRight:44}}
              type={showPw?"text":"password"} value={loginForm.password}
              onChange={e=>setLoginForm(f=>({...f,password:e.target.value}))}
              placeholder="Enter password" onKeyDown={e=>e.key==="Enter"&&login()}/>
            <button onClick={()=>setShowPw(p=>!p)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.muted}}>{showPw?"🙈":"👁"}</button>
          </div>
          {loginErr&&<p style={S.err}>{loginErr}</p>}
          <button style={{...S.btnP,width:"100%",padding:12,fontSize:15}} onClick={login}>Sign in</button>
          <div style={{marginTop:16,padding:"12px 14px",background:C.bg,borderRadius:8,fontSize:12,color:C.muted,lineHeight:1.8}}>
            <strong>Manager:</strong> admin / admin123<br/>
            <strong>Employees:</strong> emp1/pass1 · emp2/pass2 · emp3/pass3
          </div>
        </div>
      </div>
    </div>
  );

  // ── Shared header ──────────────────────────────────────────────────────────
  const Header = () => (
    <div style={{background:C.surface,borderBottom:`0.5px solid ${C.border}`,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {user.role==="employee"&&<Avatar name={user.name}/>}
        <div>
          <p style={{margin:0,fontSize:11,color:C.faint}}>{user.role==="master"?"Manager":"Employee"}</p>
          <h2 style={{margin:0,fontSize:16,fontWeight:700,color:C.text}}>{user.role==="master"?"TaskFlow":user.name}</h2>
        </div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {saving&&<span style={{fontSize:11,color:C.muted}}>Saving…</span>}
        <button style={{...S.btn,position:"relative",padding:"8px 11px",fontSize:18}} onClick={()=>setNotifOpen(true)}>
          🔔
          {unread>0&&<span style={{position:"absolute",top:2,right:2,background:C.red,color:"#fff",borderRadius:10,padding:"0 5px",fontSize:10,fontWeight:700,minWidth:15,textAlign:"center"}}>{unread>9?"9+":unread}</span>}
        </button>
        <button style={S.btn} onClick={logout}>Sign out</button>
      </div>
    </div>
  );

  // ── Employee view ──────────────────────────────────────────────────────────
  if (user.role==="employee") {
    const myTasks       = getEmpTasks(user.id);
    const todayTasks    = myTasks.filter(t=>shouldShowToday(t));
    const upcomingTasks = myTasks.filter(t=>!t.isDaily&&daysUntil(t.dueDate)>1&&shouldRemind(t));
    const doneCount     = myTasks.filter(t=>getStatus(t,user.id)?.state==="done").length;
    return (
      <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80}}>
        <Header/>
        <div style={{padding:"16px 16px 0"}}>
          <div style={S.row}>
            {[{l:"Total",v:myTasks.length,c:C.purpleD,bg:C.purpleL},{l:"Today",v:todayTasks.length,c:C.amberD,bg:C.amberL},{l:"Done",v:doneCount,c:C.greenD,bg:C.greenL},{l:"Upcoming",v:upcomingTasks.length,c:C.blueD,bg:C.blueL}].map(x=>(
              <div key={x.l} style={S.summ(x.c,x.bg)}><div style={{fontSize:22,fontWeight:800,color:x.c}}>{x.v}</div><div style={{fontSize:11,color:x.c,opacity:.85}}>{x.l}</div></div>
            ))}
          </div>
        </div>
        <div style={{padding:"0 16px"}}>
          {tab==="today"&&(todayTasks.length===0
            ?<div style={{textAlign:"center",padding:"50px 0",color:C.faint}}><div style={{fontSize:40}}>🎉</div><p style={{marginTop:10,fontSize:15}}>All caught up for today!</p></div>
            :todayTasks.map(t=><TaskCard key={t.id} task={t} empId={user.id} onMarkDone={()=>markDone(t.id,user.id)} isManager={false}/>)
          )}
          {tab==="upcoming"&&(upcomingTasks.length===0
            ?<div style={{textAlign:"center",padding:"50px 0",color:C.faint}}><div style={{fontSize:40}}>📅</div><p style={{marginTop:10,fontSize:15}}>No upcoming reminders.</p></div>
            :upcomingTasks.map(t=><TaskCard key={t.id} task={t} empId={user.id} onMarkDone={()=>markDone(t.id,user.id)} isManager={false}/>)
          )}
        </div>
        <BottomNav role="employee" tab={tab} setTab={setTab}/>
        {notifOpen&&<NotifDrawer notifs={myNotifs} onClear={clearNotifs} onClose={()=>setNotifOpen(false)}/>}
      </div>
    );
  }

  // ── Manager view ───────────────────────────────────────────────────────────
  return (
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:80}}>
      <Header/>
      <div style={{padding:"16px 16px 0"}}>
        <div style={S.row}>
          {[{l:"Tasks",v:taskList.length,c:C.purpleD,bg:C.purpleL},{l:"Pending",v:pendingApprovals.length,c:C.amberD,bg:C.amberL},{l:"Overdue",v:overdueCount,c:C.redD,bg:C.redL},{l:"Team",v:activeEmps.length,c:C.blueD,bg:C.blueL}].map(x=>(
            <div key={x.l} style={S.summ(x.c,x.bg)}><div style={{fontSize:22,fontWeight:800,color:x.c}}>{x.v}</div><div style={{fontSize:11,color:x.c,opacity:.85}}>{x.l}</div></div>
          ))}
        </div>
      </div>

      <div style={{padding:"0 16px"}}>
        {(tab==="today"||tab==="all")&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <select style={{padding:"8px 10px",borderRadius:8,border:`0.5px solid ${C.border}`,fontSize:13,background:C.surface}} value={filterEmp} onChange={e=>setFilterEmp(e.target.value)}>
              <option value="all">All employees</option>
              {activeEmps.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
            <button style={S.btnP} onClick={()=>{setFormErr("");setAddTaskOpen(true);}}>+ Add task</button>
          </div>
          {filteredEmps.map(emp=>{
            const empTasks = tab==="today" ? getEmpTasks(emp.id).filter(t=>shouldShowToday(t)) : getEmpTasks(emp.id);
            return (
              <div key={emp.id} style={{marginBottom:20}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <Avatar name={emp.name} size={28}/>
                  <span style={{fontSize:14,fontWeight:700,color:"#444"}}>{emp.name}</span>
                  <span style={{fontSize:12,color:C.faint}}>@{emp.username}</span>
                </div>
                {empTasks.length===0 ? <p style={{fontSize:13,color:C.faint,marginLeft:36}}>No tasks.</p>
                  : empTasks.map(t=><div key={t.id} style={{marginLeft:36}}><TaskCard task={t} empId={emp.id} onDelete={()=>setDeleteConfirm(t.id)} isManager={true}/></div>)}
              </div>
            );
          })}
        </>}

        {tab==="approvals"&&<>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Pending approvals</h3>
          {pendingApprovals.length===0
            ?<div style={{textAlign:"center",padding:"40px 0",color:C.faint}}><div style={{fontSize:36}}>✅</div><p style={{marginTop:10}}>No pending approvals.</p></div>
            :pendingApprovals.map(({task,empId})=>(
              <div key={`${task.id}-${empId}`} style={S.card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <Avatar name={empName(empId)} size={34}/>
                    <div>
                      <p style={{margin:0,fontWeight:700,fontSize:14}}>{task.title}</p>
                      <p style={{margin:"3px 0 0",fontSize:13,color:C.muted}}>{empName(empId)}{!task.isDaily&&` · Due ${task.dueDate}`}</p>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button style={S.btnS} onClick={()=>approveTask(task.id,empId)}>Approve</button>
                    <button style={S.btnD} onClick={()=>{setRejectModal({taskId:task.id,empId});setRejectComment("");}}>Reject</button>
                  </div>
                </div>
              </div>
            ))
          }
        </>}

        {tab==="employees"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h3 style={{fontSize:15,fontWeight:700,margin:0}}>Team</h3>
            <button style={S.btnP} onClick={()=>{setFormErr("");setAddEmpOpen(true);}}>+ Add</button>
          </div>
          {employees.map(emp=>{
            const total  =getEmpTasks(emp.id).length;
            const done   =taskList.filter(t=>t.assignedTo&&t.assignedTo[emp.id]&&getStatus(t,emp.id)?.state==="done").length;
            const pending=taskList.filter(t=>t.assignedTo&&t.assignedTo[emp.id]&&getStatus(t,emp.id)?.state==="pending").length;
            return (
              <div key={emp.id} style={{...S.card,opacity:emp.active?1:.55}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <Avatar name={emp.name} size={42}/>
                    <div>
                      <p style={{margin:0,fontWeight:700,fontSize:14}}>{emp.name}</p>
                      <p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>@{emp.username}{!emp.active&&" · Deactivated"}</p>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <Badge label={`${total} tasks`} color={C.blueD}  bg={C.blueL}/>
                    <Badge label={`${done} done`}   color={C.greenD} bg={C.greenL}/>
                    {pending>0&&<Badge label={`${pending} pending`} color={C.amberD} bg={C.amberL}/>}
                    <button style={{...S.btn,fontSize:12,padding:"6px 12px"}} onClick={()=>emp.active?setDeactivateConfirm(emp.id):doToggleDeactivate(emp.id)}>
                      {emp.active?"Deactivate":"Reactivate"}
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </>}
      </div>

      <BottomNav role="master" tab={tab} setTab={setTab} badge={pendingApprovals.length}/>
      {notifOpen&&<NotifDrawer notifs={myNotifs} onClear={clearNotifs} onClose={()=>setNotifOpen(false)}/>}

      {/* Modals */}
      {addTaskOpen&&(
        <Modal title="Add new task" onClose={()=>setAddTaskOpen(false)}>
          {formErr&&<p style={S.err}>{formErr}</p>}
          <label style={S.label}>Task title *</label>
          <input style={S.input} value={newTask.title} autoFocus onChange={e=>setNewTask(t=>({...t,title:e.target.value}))} placeholder="e.g. Submit daily report"/>
          <label style={S.label}>Description</label>
          <textarea style={S.textarea} value={newTask.desc} onChange={e=>setNewTask(t=>({...t,desc:e.target.value}))} placeholder="Instructions for the employee"/>
          <label style={S.label}>Due date</label>
          <input style={{...S.input,marginBottom:8}} type="date" value={newTask.dueDate} onChange={e=>setNewTask(t=>({...t,dueDate:e.target.value}))}/>
          <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,marginBottom:14,cursor:"pointer"}}>
            <input type="checkbox" checked={newTask.isDaily} onChange={e=>setNewTask(t=>({...t,isDaily:e.target.checked}))}/>
            Recurring daily task
          </label>
          <label style={S.label}>Assign to *</label>
          <div style={{marginBottom:16}}>
            {activeEmps.map(e=>(
              <label key={e.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,cursor:"pointer",fontSize:14}}>
                <input type="checkbox" style={{width:18,height:18}} checked={!!newTask.assignedTo[e.id]}
                  onChange={()=>setNewTask(t=>{const a={...t.assignedTo};a[e.id]?delete a[e.id]:a[e.id]=true;return{...t,assignedTo:a};})}/>
                <Avatar name={e.name} size={24}/>{e.name}
              </label>
            ))}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button style={S.btnP} onClick={doAddTask}>{saving?"Saving…":"Add task"}</button>
            <button style={S.btn}  onClick={()=>setAddTaskOpen(false)}>Cancel</button>
          </div>
        </Modal>
      )}
      {addEmpOpen&&(
        <Modal title="Add employee" onClose={()=>setAddEmpOpen(false)}>
          {formErr&&<p style={S.err}>{formErr}</p>}
          <label style={S.label}>Full name *</label>
          <input style={S.input} value={newEmp.name} autoFocus onChange={e=>setNewEmp(n=>({...n,name:e.target.value}))} placeholder="e.g. Ananya Singh"/>
          <label style={S.label}>Username *</label>
          <input style={S.input} value={newEmp.username} onChange={e=>setNewEmp(n=>({...n,username:e.target.value}))} placeholder="e.g. ananya"/>
          <label style={S.label}>Password * (min 4 chars)</label>
          <input style={S.input} type="password" value={newEmp.password} onChange={e=>setNewEmp(n=>({...n,password:e.target.value}))} placeholder="Set a password"/>
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button style={S.btnP} onClick={doAddEmployee}>{saving?"Saving…":"Add employee"}</button>
            <button style={S.btn}  onClick={()=>setAddEmpOpen(false)}>Cancel</button>
          </div>
        </Modal>
      )}
      {rejectModal&&(
        <Modal title="Reject task" onClose={()=>setRejectModal(null)}>
          <p style={{fontSize:14,color:C.muted,marginTop:0}}>Tell the employee what needs to be fixed.</p>
          <label style={S.label}>Reason *</label>
          <textarea style={S.textarea} value={rejectComment} autoFocus onChange={e=>setRejectComment(e.target.value)} placeholder="e.g. Missing Q3 figures. Please include all months."/>
          <div style={{display:"flex",gap:10}}>
            <button style={S.btnD} onClick={doRejectTask}>{saving?"Saving…":"Reject"}</button>
            <button style={S.btn}  onClick={()=>setRejectModal(null)}>Cancel</button>
          </div>
        </Modal>
      )}
      {deleteConfirm&&(
        <Modal title="Delete task?" onClose={()=>setDeleteConfirm(null)}>
          <p style={{fontSize:14,color:C.muted,marginTop:0}}>Removes the task for all employees. Cannot be undone.</p>
          <div style={{display:"flex",gap:10}}>
            <button style={S.btnD} onClick={()=>doDeleteTask(deleteConfirm)}>{saving?"Deleting…":"Delete"}</button>
            <button style={S.btn}  onClick={()=>setDeleteConfirm(null)}>Cancel</button>
          </div>
        </Modal>
      )}
      {deactivateConfirm&&(
        <Modal title="Deactivate employee?" onClose={()=>setDeactivateConfirm(null)}>
          <p style={{fontSize:14,color:C.muted,marginTop:0}}><strong>{empName(deactivateConfirm)}</strong> won't be able to sign in. History preserved. Reactivate anytime.</p>
          <div style={{display:"flex",gap:10}}>
            <button style={S.btnD} onClick={()=>doToggleDeactivate(deactivateConfirm)}>Deactivate</button>
            <button style={S.btn}  onClick={()=>setDeactivateConfirm(null)}>Cancel</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
